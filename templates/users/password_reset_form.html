{% extends 'base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Восстановление пароля</h3>
            </div>
            <div class="card-body">
                <p class="text-muted">Забыли пароль? Введите ваш email, и мы отправим инструкции для восстановления.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" id="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Отправить инструкции</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'users:login' %}">Вернуться ко входу</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
