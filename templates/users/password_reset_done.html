{% extends 'base.html' %}

{% block title %}Инструкция отправлена{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Проверьте почту</h3>
            </div>
            <div class="card-body text-center">
                <i class="bi bi-envelope-check fs-1 text-success"></i>
                <p class="mt-3">Мы отправили инструкцию по восстановлению пароля на ваш email.</p>
                <p class="text-muted">Если вы не получили письмо, проверьте папку "Спам".</p>
                <a href="{% url 'users:login' %}" class="btn btn-primary mt-3">Вернуться ко входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
