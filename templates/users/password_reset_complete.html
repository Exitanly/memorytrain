{% extends 'base.html' %}

{% block title %}Пароль изменён{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Пароль успешно изменён!</h3>
            </div>
            <div class="card-body text-center">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <p class="mt-3">Ваш пароль был успешно изменён.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">Войти с новым паролем</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
