{% extends 'tasks_new/game_base.html' %}

{% block game_content %}
<style>
    .grid-container {
        display: inline-block;
        margin: 20px auto;
    }
    .grid-cell {
        width: 80px;
        height: 80px;
        border: 2px solid #ddd;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        background-color: #f0f0f0;
    }
    .grid-cell:hover {
        transform: scale(1.02);
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    .grid-cell.active {
        background-color: #28a745;
    }
    .timer {
        font-size: 3rem;
        font-weight: bold;
        color: #ff9800;
        margin: 20px 0;
    }
</style>

<div class="text-center">
    <div id="memory-phase">
        <h4>Запомните расположение зелёных клеток!</h4>
        <div id="pattern-display" class="grid-container"></div>
        <p class="text-muted">У вас есть {{ max_time }} секунд...</p>
        <div id="timer" class="timer">{{ max_time }}</div>
    </div>
    
    <div id="test-phase" style="display: none;">
        <h4>Повторите расположение клеток</h4>
        <div id="pattern-input" class="grid-container"></div>
        <div class="mt-3">
            <p>Выбрано: <strong><span id="selected-count">0</span> / {{ task_data.cells_count }}</strong></p>
            <button type="button" class="btn btn-primary" id="check-pattern">Проверить</button>
            <a href="{% url 'exercise_play' exercise.slug %}" class="btn btn-warning ms-2">Начать заново</a>
        </div>
    </div>
</div>

<script>
    const gridSize = {{ task_data.grid_size }};
    const correctPattern = {{ task_data.pattern|safe }};
    const cellsCount = {{ task_data.cells_count }};
    const maxTime = {{ max_time }};
    
    let selectedCells = [];
    let timerInterval;
    let timeLeft = maxTime;
    
    function createGrid(containerId, isInteractive = false) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        container.style.display = 'grid';
        container.style.gridTemplateColumns = `repeat(${gridSize}, 80px)`;
        container.style.gap = '10px';
        container.style.justifyContent = 'center';
        
        for (let i = 0; i < gridSize * gridSize; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.dataset.index = i;
            
            if (isInteractive) {
                cell.addEventListener('click', () => toggleCell(cell, i));
            }
            
            container.appendChild(cell);
        }
    }
    
    function displayPattern() {
        const container = document.getElementById('pattern-display');
        if (!container) return;
        const cells = container.children;
        correctPattern.forEach(idx => {
            if (cells[idx]) {
                cells[idx].style.backgroundColor = '#28a745';
                cells[idx].classList.add('active');
            }
        });
    }
    
    function toggleCell(cell, index) {
        if (selectedCells.includes(index)) {
            selectedCells = selectedCells.filter(i => i !== index);
            cell.style.backgroundColor = '#f0f0f0';
            cell.classList.remove('active');
        } else {
            if (selectedCells.length < cellsCount) {
                selectedCells.push(index);
                cell.style.backgroundColor = '#28a745';
                cell.classList.add('active');
            } else {
                alert(`Можно выбрать только ${cellsCount} клеток!`);
            }
        }
        
        // Обновляем счётчик
        const countDisplay = document.getElementById('selected-count');
        if (countDisplay) {
            countDisplay.textContent = selectedCells.length;
        }
    }
    
    function startTimer() {
        const timerDisplay = document.getElementById('timer');
        if (!timerDisplay) return;
        
        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                showTestPhase();
            }
        }, 1000);
    }
    
    function showTestPhase() {
        clearInterval(timerInterval);
        document.getElementById('memory-phase').style.display = 'none';
        document.getElementById('test-phase').style.display = 'block';
        createGrid('pattern-input', true);
    }
    
    // Кнопка проверки
    const checkBtn = document.getElementById('check-pattern');
    if (checkBtn) {
        checkBtn.addEventListener('click', () => {
            if (selectedCells.length !== cellsCount) {
                alert(`Вы выбрали ${selectedCells.length} клеток, а нужно ${cellsCount}`);
                return;
            }
            
            const sortedSelected = [...selectedCells].sort((a, b) => a - b);
            const sortedCorrect = [...correctPattern].sort((a, b) => a - b);
            
            let isMatch = true;
            for (let i = 0; i < sortedSelected.length; i++) {
                if (sortedSelected[i] !== sortedCorrect[i]) {
                    isMatch = false;
                    break;
                }
            }
            
            if (!isMatch) {
                alert('Неправильно! Попробуйте ещё раз.');
                return;
            }
            
            // Отправляем результат
            const answerInput = document.getElementById('answer-input');
            const submitBtn = document.getElementById('submit-btn');
            
            if (answerInput && submitBtn) {
                answerInput.value = JSON.stringify(selectedCells);
                submitBtn.click();
            }
        });
    }
    
    // Инициализация
    createGrid('pattern-display', false);
    displayPattern();
    startTimer();
</script>
{% endblock %}
